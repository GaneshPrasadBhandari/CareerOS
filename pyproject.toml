[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "careeros"
version = "0.1.0"
description = "CareerOS — Agentic AI Career Agent (Capstone)"
readme = "README.md"
requires-python = ">=3.11"

# --- MERGED DEPENDENCIES ---
dependencies = [
  "python-dotenv>=1.0.0",
  "pydantic>=2.10.0",      # Upgraded for P15/P16 validation
  "fastapi>=0.110.0",
  "uvicorn>=0.27.0",
  "streamlit>=1.31.0",
  "httpx>=0.27.0",
  
  # --- New Agentic & MLOps Tools ---
  "langgraph>=0.2.0",      # Orchestration & Human-in-the-loop
  "langchain>=0.3.0",
  "langchain-openai>=0.2.0",
  "chromadb>=0.5.0",       # Vector DB for L8 Memory
  "sqlalchemy>=2.0.0",     # SQLite for Application Ledger
  "mlflow>=2.15.0",        # Decision tracing
  "evidently>=0.4.0",      # XAI and Match Fidelity monitoring
  "dvc[s3]>=3.0.0",        # Data versioning
  "twilio>=9.0.0",         # SMS alerts
  "mcp>=1.0.0",            # Model Context Protocol
  "google-search-results"  # Google Serper API
]

[project.optional-dependencies]
dev = [
  "pytest>=8.0.0",
  "pytest-cov>=5.0.0",
  "pytest-asyncio",        # Needed for testing agentic flows
  "ruff>=0.3.0",
  "black>=24.0.0",
  "isort"
]

# --- KEEP YOUR EXISTING PACKAGE LOGIC ---
[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
asyncio_mode = "auto"

# --- ADD MLOps CONFIG ---
[tool.mlflow]
experiment_name = "CareerOS_Agent_Runs"