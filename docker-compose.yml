version: "3.9"
services:
  careeros:
    build: .
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite:////data/careeros.db}
      - EMAIL_PROVIDER=${EMAIL_PROVIDER:-resend}
    ports:
      - "8501:8501"
      - "8000:8000"
    volumes:
      - careeros_data:/data
    restart: unless-stopped

volumes:
  careeros_data:
